name: Create and Publish Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Docker
      uses: docker/setup-buildx-action@v2

    - name: Check if Release already exists
      id: check_release
      run: |
        if gh release view ${{ github.ref_name }}; then
          echo "Release already exists. Skipping compression and upload." && exit 0
        fi

    - name: Compress project files
      if: steps.check_release.outcome != 'success'
      run: |
        tar -czvf OneClickRegistry.tar.gz docker-compose.yml .env.example start.sh traefik/

    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref_name }}
        release_name: Release ${{ github.ref_name }}
        draft: false
        prerelease: false

    - name: Upload Release Asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: OneClickRegistry.tar.gz
        asset_name: OneClickRegistry.tar.gz
        asset_content_type: application/gzip
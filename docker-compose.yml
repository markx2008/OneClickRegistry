# docker-compose.yml (新架構)
version: '3.8'

services:
  traefik:
    image: traefik:v2.11
    container_name: ocr-traefik
    restart: unless-stopped
    network_mode: service:tailscale
    depends_on:
      - tailscale
    command:
      - "--log.level=INFO"
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--entrypoints.registry.address=:5003"
      - "--entrypoints.registryui.address=:8082"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
      - ./registry/certs:/certs:ro

  registry:
    image: registry:2
    container_name: ocr-registry
    restart: unless-stopped
    network_mode: service:tailscale
    depends_on:
      - tailscale
    environment:
      - REGISTRY_STORAGE_FILESYSTEM_ROOTDIRECTORY=/data
      - REGISTRY_AUTH=htpasswd
      - REGISTRY_AUTH_HTPASSWD_PATH=/auth/htpasswd
      - REGISTRY_AUTH_HTPASSWD_REALM=Registry Realm
      - REGISTRY_HTTP_TLS_CERTIFICATE=/certs/registry.crt
      - REGISTRY_HTTP_TLS_KEY=/certs/registry.key
      - REGISTRY_HTTP_HEADERS_Access-Control-Allow-Origin=['https://${REGISTRY_DOMAIN}:8082']
      - REGISTRY_HTTP_HEADERS_Access-Control-Allow-Methods=['HEAD', 'GET', 'OPTIONS', 'DELETE']
      - REGISTRY_HTTP_HEADERS_Access-Control-Allow-Headers=['Authorization', 'Accept', 'Origin']
      - REGISTRY_HTTP_HEADERS_Access-Control-Allow-Credentials=['true']
      - REGISTRY_HTTP_ADDR=0.0.0.0:5000 # Changed to 5000
    volumes:
      - ./registry/data:/data
      - ./registry/auth:/auth:ro
      - ./registry/certs:/certs:ro
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=service:tailscale"
      - "traefik.http.routers.registry.rule=Host(`${REGISTRY_DOMAIN}`)"
      - "traefik.http.routers.registry.entrypoints=registry"
      - "traefik.http.routers.registry.tls=true"
      - "traefik.http.routers.registry.service=registry-service"
      - "traefik.http.services.registry-service.loadbalancer.server.port=5000"
      - "traefik.http.services.registry-service.loadbalancer.server.scheme=https"
      - "traefik.http.services.registry-service.loadbalancer.serverstransport=insecureskipverify@file"

  registry-ui:
    image: joxit/docker-registry-ui:main
    container_name: ocr-registry-ui
    restart: unless-stopped
    network_mode: service:tailscale
    depends_on:
      - tailscale
    environment:
      - REGISTRY_URL=https://${REGISTRY_DOMAIN}:5003
      - REGISTRY_TITLE=${REGISTRY_UI_TITLE}
      - DELETE_IMAGES=true
      - NGINX_LISTEN_PORT=80
      - SINGLE_REGISTRY=true
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=service:tailscale"
      - "traefik.http.routers.registry-ui.rule=Host(`${REGISTRY_DOMAIN}`)"
      - "traefik.http.routers.registry-ui.entrypoints=registryui"
      - "traefik.http.routers.registry-ui.tls=true"
      - "traefik.http.routers.registry-ui.service=registry-ui-service"
      - "traefik.http.services.registry-ui-service.loadbalancer.server.port=80"

  tailscale:
    image: tailscale/tailscale:latest
    container_name: ocr-tailscale
    hostname: ${TS_HOSTNAME:-ocr-funnel}
    dns:
      - 1.1.1.1
      - 8.8.8.8
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      
    volumes:
      - ts-state:/var/lib/tailscale
      - ./tailscale/config:/config
      - ./registry/certs:/certs
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
      - sys_module
    restart: unless-stopped

volumes:
  ts-state:
    driver: local
